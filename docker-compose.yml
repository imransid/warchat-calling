services:
  app:
    build: .
    container_name: warmchats-calling-app
    # ONLY expose to localhost — nginx on the host will reverse-proxy.
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/warmchats
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - APP_URL=${APP_URL}
      - TELNYX_API_KEY=${TELNYX_API_KEY}
      - TELNYX_CONNECTION_ID=${TELNYX_CONNECTION_ID}
      - TELNYX_CREDENTIAL_CONNECTION_ID=${TELNYX_CREDENTIAL_CONNECTION_ID}
      - TELNYX_SIP_DOMAIN=${TELNYX_SIP_DOMAIN}
      - TELNYX_MESSAGING_PROFILE_ID=${TELNYX_MESSAGING_PROFILE_ID}
      - TELNYX_PUBLIC_KEY=${TELNYX_PUBLIC_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      - DEFAULT_RING_TIMEOUT=${DEFAULT_RING_TIMEOUT:-25}
      - DEFAULT_MISSED_CALL_SMS=${DEFAULT_MISSED_CALL_SMS}
    # Run prisma migrations before starting the app. If you'd rather keep the
    # Dockerfile CMD untouched, move this to a separate one-shot service.
    command: >
      sh -c "npx prisma migrate deploy &&
             node dist/main.js"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: warmchats-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: warmchats
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # localhost only — internal services reach it via the docker network.
    ports:
      - "127.0.0.1:5433:5432"     # host 5433 → container 5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: warmchats-redis
    # localhost only.
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: warmchats-network