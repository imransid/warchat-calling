# =====================================================================
#  WarmChats Calling — nginx reverse proxy
# =====================================================================
#
# Drop this file at:
#   /etc/nginx/sites-available/warchat-calling.conf
#   ln -s ../sites-available/warchat-calling.conf /etc/nginx/sites-enabled/
#
# Replace `api.warmchats.com` with YOUR backend's domain everywhere.
# After certbot --nginx -d api.warmchats.com runs, certbot will inject
# the cert paths automatically — you should not need to edit them.
#
# What this config gets right (vs the typical copy-paste):
#   1. Socket.IO WebSocket upgrade on /socket.io/  — without this the
#      CallingGateway connection 400s and the UI never receives
#      `call_state` / `incoming_call`.
#   2. Telnyx webhook POSTs go through with rawBody intact — buffering
#      stays default ON for the regular API but proxy_request_buffering
#      is left alone so signature verification works.
#   3. Long read timeout on /socket.io/ (24h) so long-lived WS
#      connections aren't killed.
#   4. Per-endpoint rate limiting that lets webhooks through bursty
#      Telnyx traffic but throttles the public API.
#   5. Strict no-cache on /webhooks/* (proxies in between have been
#      observed to cache 200 OK responses, which causes Telnyx to
#      retry against a cached body — disaster).
#   6. Hides Server header and adds standard security headers.

# ---------------------------------------------------------------------
# Rate limit zones — global, declared at http {} via the include in
# nginx.conf. If you can't edit nginx.conf, copy these into the main
# http {} block instead of putting them here.
# ---------------------------------------------------------------------
limit_req_zone $binary_remote_addr zone=warchat_api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=warchat_webhook:10m rate=200r/s;

# Upstream — Node listens on 127.0.0.1:3000 inside the box. If you run
# the app in Docker, change to the container name + port (e.g. app:3000).
upstream warchat_calling_upstream {
    server 127.0.0.1:3000;
    keepalive 32;
}

# ---------------------------------------------------------------------
# HTTP — redirect everything to HTTPS, except Let's Encrypt challenges.
# ---------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name api.warmchats.com;

    # Allow certbot HTTP-01 challenges
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------------------
# HTTPS — the real server.
# ---------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.warmchats.com;

    # SSL — certbot will overwrite these paths when you run
    # `sudo certbot --nginx -d api.warmchats.com`
    ssl_certificate     /etc/letsencrypt/live/api.warmchats.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.warmchats.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ----- Hardening -------------------------------------------------
    server_tokens off;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Telnyx webhook payloads are small (<10KB). Leave generous headroom for
    # multipart bodies elsewhere but reject anything absurd.
    client_max_body_size 5m;

    # ----- Common proxy params --------------------------------------
    # (Pulled inline rather than via include so this file is self-contained.)
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_redirect off;

    # =================================================================
    # 1. SOCKET.IO  — WebSocket + long-polling fallback
    # =================================================================
    # The CallingGateway emits call_state, incoming_call, missed_while_busy.
    # Without these headers the upgrade fails and the frontend never gets
    # live updates.
    location /socket.io/ {
        proxy_pass http://warchat_calling_upstream;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_read_timeout 24h;     # keep WS alive
        proxy_send_timeout 24h;
    }

    # =================================================================
    # 2. TELNYX WEBHOOKS  — note: this path is excluded from the /api
    #    prefix in main.ts, so it stays at the root.
    # =================================================================
    location /webhooks/calling/ {
        # Telnyx retries can burst — allow up to 50 above-rate before queuing.
        limit_req zone=warchat_webhook burst=50 nodelay;

        # Never cache webhook responses. Some upstream proxies cache 200 OK
        # and Telnyx retries land on the cached response, causing the
        # backend to never see the retry.
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        expires off;

        # Important: do NOT enable proxy_request_buffering = off here.
        # NestJS reads `rawBody` from Express to verify the Telnyx Ed25519
        # signature; default buffering preserves the body bytes correctly.
        proxy_pass http://warchat_calling_upstream;
    }

    # =================================================================
    # 3. HEALTH CHECK  — exposed without the /api prefix per main.ts
    # =================================================================
    location = /health {
        proxy_pass http://warchat_calling_upstream;
        access_log off;
    }

    # =================================================================
    # 4. EVERYTHING ELSE  — the JSON API under /api/*
    # =================================================================
    location / {
        limit_req zone=warchat_api burst=20 nodelay;
        proxy_pass http://warchat_calling_upstream;
    }

    # =================================================================
    # 5. ACCESS LOG
    # =================================================================
    access_log /var/log/nginx/warchat-calling.access.log;
    error_log  /var/log/nginx/warchat-calling.error.log warn;
}
